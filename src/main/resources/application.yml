# 应用配置
spring:
  application:
    name: ceasejoy-api

  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/ceasejoy?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ceasejoy
    password: CeaseJoy@2026!
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password: HuHuDiDi@2026!

  # RabbitMQ 配置
  rabbitmq:
    host: localhost
    port: 5672
    username: ceasejoy
    password: HuHuDiDi@2026!
    virtual-host: /

# 服务端口
server:
  port: 8080

# JWT 配置
jwt:
  secret: CeaseJoy-JWT-Secret-Key-2026-MustBe32Chars!!
  expiration-ms: 2592000000  # 30天

# 飞书配置（从环境变量读取）
feishu:
  app-id: ${FEISHU_APP_ID:}
  app-secret: ${FEISHU_APP_SECRET:}
  redirect-uri: ${FEISHU_REDIRECT_URI:https://c.easejoy.com/api/auth/feishu/callback}

# 前端地址
app:
  frontend-url: ${FRONTEND_URL:https://c.easejoy.com}

# 日志
logging:
  level:
    com.ceasejoy: INFO
