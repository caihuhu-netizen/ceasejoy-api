name: 🚀 Deploy Java API to ECS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 拉取代码
        uses: actions/checkout@v4

      - name: ☕ 配置 Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🔨 Maven 打包
        run: mvn clean package -DskipTests

      - name: 🔑 配置 SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ECS_SSH_KEY }}

      - name: 🚀 部署到 ECS
        run: |
          ssh-keyscan 8.210.161.159 >> ~/.ssh/known_hosts
          scp target/ceasejoy-api-1.0.0.jar root@8.210.161.159:/opt/apps/ceasejoy-api/ceasejoy-api.jar
          ssh root@8.210.161.159 "systemctl restart ceasejoy-api && echo '✅ 部署完成！'"

      - name: ✅ 健康检查
        run: |
          sleep 10
          curl -f http://8.210.161.159:8080/api/health || exit 1
